<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Review Detector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 2rem;
    }
    h1 { font-size: 1.6rem; margin-bottom: 0.25rem; }
    .subtitle { color: #666; margin-bottom: 2rem; font-size: 0.95rem; }
    .card {
      background: white;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    h2 { font-size: 1.1rem; margin-bottom: 1rem; }
    textarea {
      width: 100%;
      min-height: 120px;
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      resize: vertical;
      font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #4f8ef7; }
    button {
      margin-top: 0.75rem;
      padding: 0.55rem 1.4rem;
      background: #4f8ef7;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    button:hover { background: #3a7de0; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    .result {
      margin-top: 1rem;
      padding: 0.9rem 1rem;
      border-radius: 6px;
      font-size: 0.95rem;
      display: none;
    }
    .result.real    { background: #e8f5e9; border-left: 4px solid #4caf50; }
    .result.ai      { background: #fdecea; border-left: 4px solid #f44336; }
    .result.neutral { background: #e3f2fd; border-left: 4px solid #2196f3; }
    .label { font-weight: 600; font-size: 1.05rem; }
    .conf  { color: #555; font-size: 0.88rem; margin-top: 0.25rem; }
    .conf-bar-wrap {
      margin-top: 0.5rem;
      background: #eee;
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }
    .conf-bar { height: 100%; border-radius: 4px; transition: width 0.4s ease; }

    /* Adjust rating section */
    .review-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      align-items: flex-start;
    }
    .review-row textarea { min-height: 60px; flex: 1; }
    .star-select {
      padding: 0.55rem 0.4rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      width: 64px;
      flex-shrink: 0;
    }
    .remove-btn {
      background: #eee;
      color: #555;
      padding: 0.4rem 0.6rem;
      margin-top: 0;
      font-size: 0.85rem;
    }
    .remove-btn:hover { background: #ddd; }
    .add-btn {
      background: #eee;
      color: #333;
      margin-top: 0;
      margin-right: 0.5rem;
    }
    .add-btn:hover { background: #ddd; }
    .rating-summary {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    .rating-box {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 0.75rem 1.25rem;
      text-align: center;
    }
    .rating-box .num { font-size: 2rem; font-weight: 700; }
    .rating-box .lbl { font-size: 0.8rem; color: #666; margin-top: 0.1rem; }
    .review-results { margin-top: 1rem; }
    .review-result-row {
      padding: 0.6rem 0.75rem;
      margin-bottom: 0.4rem;
      border-radius: 6px;
      font-size: 0.88rem;
      border-left: 4px solid transparent;
    }
    .review-result-row.real { background: #e8f5e9; border-color: #4caf50; }
    .review-result-row.ai   { background: #fdecea; border-color: #f44336; }
    .review-result-row .rtext { color: #444; margin-top: 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    .error { color: #c62828; margin-top: 0.75rem; font-size: 0.9rem; display: none; }
  </style>
</head>
<body>

<h1>🔍 AI Review Detector</h1>
<p class="subtitle">Powered by fine-tuned DistilBERT · Detects AI-generated restaurant reviews</p>

<!-- Single review detection -->
<div class="card">
  <h2>Detect a single review</h2>
  <textarea id="single-text" placeholder="Paste a restaurant review here..."></textarea>
  <button id="detect-btn" onclick="detectReview()">Detect</button>
  <div id="detect-error" class="error"></div>
  <div id="detect-result" class="result">
    <div class="label" id="detect-label"></div>
    <div class="conf" id="detect-conf"></div>
    <div class="conf-bar-wrap"><div class="conf-bar" id="detect-bar"></div></div>
  </div>
</div>

<!-- Adjust rating -->
<div class="card">
  <h2>Adjust restaurant rating</h2>
  <p style="font-size:0.88rem;color:#666;margin-bottom:1rem;">
    Add reviews below with their star ratings. The adjusted rating strips out detected AI reviews.
  </p>
  <div id="review-rows"></div>
  <button class="add-btn" onclick="addRow()">+ Add review</button>
  <button onclick="adjustRating()">Calculate adjusted rating</button>
  <div id="adjust-error" class="error"></div>
  <div id="rating-summary" class="rating-summary" style="display:none"></div>
  <div id="review-results" class="review-results"></div>
</div>

<script>
  const API = "";  // same origin; change to "http://localhost:8080" if needed

  // ── Single detect ──────────────────────────────────────────────────────────
  async function detectReview() {
    const text = document.getElementById("single-text").value.trim();
    const errEl = document.getElementById("detect-error");
    errEl.style.display = "none";
    if (!text) { showError(errEl, "Please enter a review."); return; }

    const btn = document.getElementById("detect-btn");
    btn.disabled = true; btn.textContent = "Detecting…";

    try {
      const res = await fetch(`${API}/detect`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ review_text: text }),
      });
      if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
      const data = await res.json();
      showDetectResult(data);
    } catch (e) {
      showError(errEl, e.message);
    } finally {
      btn.disabled = false; btn.textContent = "Detect";
    }
  }

  function showDetectResult(data) {
    const el   = document.getElementById("detect-result");
    const isAI = data.flagged;
    el.className = `result ${isAI ? "ai" : "real"}`;
    el.style.display = "block";
    document.getElementById("detect-label").textContent =
      isAI ? "🤖 AI-generated" : "✅ Looks Real";
    const pct = Math.round(data.confidence * 100);
    document.getElementById("detect-conf").textContent =
      `Confidence (P(AI)): ${pct}%`;
    const bar = document.getElementById("detect-bar");
    bar.style.width = `${pct}%`;
    bar.style.background = isAI ? "#f44336" : "#4caf50";
  }

  // ── Adjust rating ──────────────────────────────────────────────────────────
  function addRow(text = "", star = 5) {
    const container = document.getElementById("review-rows");
    const idx = container.children.length;
    const row = document.createElement("div");
    row.className = "review-row";
    row.innerHTML = `
      <textarea placeholder="Review text…" rows="2">${text}</textarea>
      <select class="star-select" title="Star rating">
        ${[1,2,3,4,5].map(s => `<option value="${s}" ${s===star?"selected":""}>${s}★</option>`).join("")}
      </select>
      <button class="remove-btn" onclick="this.parentElement.remove()">✕</button>
    `;
    container.appendChild(row);
  }

  async function adjustRating() {
    const rows = document.querySelectorAll("#review-rows .review-row");
    const errEl = document.getElementById("adjust-error");
    errEl.style.display = "none";

    const reviews = [];
    for (const row of rows) {
      const text = row.querySelector("textarea").value.trim();
      const star = parseInt(row.querySelector("select").value);
      if (text) reviews.push({ text, star_rating: star });
    }
    if (!reviews.length) { showError(errEl, "Add at least one review."); return; }

    const btn = document.querySelector(".card:nth-child(2) button:last-of-type");
    btn.disabled = true; btn.textContent = "Calculating…";

    try {
      const res = await fetch(`${API}/adjust-rating`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ reviews }),
      });
      if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
      const data = await res.json();
      showAdjustResult(data);
    } catch (e) {
      showError(errEl, e.message);
    } finally {
      btn.disabled = false; btn.textContent = "Calculate adjusted rating";
    }
  }

  function showAdjustResult(data) {
    const summary = document.getElementById("rating-summary");
    summary.style.display = "flex";
    summary.innerHTML = `
      <div class="rating-box">
        <div class="num">${data.original_rating ?? "—"}</div>
        <div class="lbl">Original rating</div>
      </div>
      <div class="rating-box">
        <div class="num" style="color:${data.adjusted_rating < data.original_rating ? "#f44336" : "#4caf50"}">${data.adjusted_rating ?? "—"}</div>
        <div class="lbl">Adjusted rating</div>
      </div>
      <div class="rating-box">
        <div class="num">${data.flagged_count}</div>
        <div class="lbl">AI reviews flagged</div>
      </div>
      <div class="rating-box">
        <div class="num">${data.total_reviews}</div>
        <div class="lbl">Total reviews</div>
      </div>
    `;

    const resultsEl = document.getElementById("review-results");
    resultsEl.innerHTML = data.reviews.map(r => `
      <div class="review-result-row ${r.flagged ? "ai" : "real"}">
        <strong>${r.flagged ? "🤖 AI-generated" : "✅ Real"}</strong>
        · ${r.star_rating}★ · P(AI)=${Math.round(r.confidence*100)}%
        <div class="rtext">${escHtml(r.text)}</div>
      </div>
    `).join("");
  }

  function showError(el, msg) {
    el.textContent = "Error: " + msg;
    el.style.display = "block";
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // seed two example rows on load
  window.onload = () => {
    addRow("Amazing tacos, best I've had in years. The salsa verde is incredible and the staff were super friendly.", 5);
    addRow("Absolutely delightful dining experience! The expertly crafted menu showcased a harmonious blend of flavors, with each dish thoughtfully presented to perfection.", 5);
  };
</script>

</body>
</html>
